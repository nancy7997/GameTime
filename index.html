<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <title>Karaoke Showdown</title>
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-dark: #282828;
            --text-main: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background-color: var(--spotify-black);
            color: var(--text-main);
            margin: 0;
            padding: env(safe-area-inset-top) 10px 10px 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        h1 { color: var(--spotify-green); font-weight: 900; margin: 5px 0; font-size: 1.5em;}
        
        .score-board {
            display: flex;
            justify-content: space-around;
            background-color: var(--spotify-dark);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .score-display { font-size: 1em; color: #b3b3b3; }
        .score-num { font-size: 1.2em; color: white; font-weight: bold; display: block; }
        .active-team { color: var(--spotify-green); border-bottom: 2px solid var(--spotify-green);}

        /* Main Game Area */
        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Spreads elements out */
            align-items: center;
            padding-bottom: 20px;
        }

        #timer {
            font-size: 60px; /* Smaller, clearer timer */
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            color: var(--spotify-green);
            margin-top: 10px;
        }

        /* SHRUNK THE WHEEL HERE */
        #wheel-container {
            position: relative;
            width: 65vw; /* Smaller width */
            height: 65vw;
            max-width: 300px; /* Caps the size for larger iPads */
            max-height: 300px;
            margin: 10px auto;
        }

        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid var(--spotify-dark);
            transition: transform 4s cubic-bezier(0.1, 0.7, 0.2, 1); 
        }

        #pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid white;
            z-index: 3;
        }

        #pin {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
            background: white;
            border-radius: 50%;
            z-index: 4;
        }

        #display {
            font-size: 1.2em;
            font-weight: bold;
            margin: 10px 0;
            min-height: 1.5em;
        }

        button {
            background-color: var(--spotify-green);
            color: white; border: none;
            padding: 15px 50px; font-size: 1.1em; font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* Popup */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--spotify-dark); padding: 30px;
            border-radius: 20px; width: 85%;
        }
        .modal button { margin: 8px 0; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1>KARAOKE</h1>
        <div class="score-board">
            <div id="t1" class="score-display active-team">T1: <span id="s1" class="score-num">0</span></div>
            <div id="t2" class="score-display">T2: <span id="s2" class="score-num">0</span></div>
        </div>
    </header>

    <div class="game-area">
        <div id="timer">02:00</div>
        
        <div id="wheel-container">
            <div id="pointer"></div>
            <div id="pin"></div>
            <canvas id="wheel-canvas" width="500" height="500"></canvas>
        </div>

        <div id="display">Next team ready?</div>
        
        <button onclick="spinWheel()" id="spinBtn">SPIN</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>Success?</h2>
            <button onclick="recordScore(100)" style="background:var(--spotify-green)">YES (100)</button>
            <button onclick="recordScore(25)" style="background:#f1c40f; color:black;">OTHER (25)</button>
            <button onclick="recordScore(0)" style="background:#e74c3c">NO (0)</button>
        </div>
    </div>

    <script>
        const categories = ["80s Rock", "Pop Divas", "Disney Hits", "Country", "90s Hip Hop", "Movie Themes"];
        const sliceColors = ['#1DB954', '#191414', '#535353', '#b3b3b3', '#2d2d2d'];

        let currentTeam = 1, score1 = 0, score2 = 0, countdownInterval, currentRotation = 0;
        const canvas = document.getElementById('wheel-canvas'), ctx = canvas.getContext('2d');
        const centerX = 250, centerY = 250, radius = 250;

        function drawWheel() {
            const numSlices = categories.length, sliceAngle = (2 * Math.PI) / numSlices;
            ctx.clearRect(0, 0, 500, 500);
            for (let i = 0; i < numSlices; i++) {
                ctx.beginPath(); ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * sliceAngle, (i+1) * sliceAngle);
                ctx.fillStyle = sliceColors[i % sliceColors.length]; ctx.fill();
                ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = "right"; ctx.fillStyle = (ctx.fillStyle === '#1db954') ? "black" : "white";
                ctx.font = "bold 30px sans-serif"; ctx.fillText(categories[i], radius - 30, 10); ctx.restore();
            }
        }

        function spinWheel() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            const numSlices = categories.length;
            const prizeIndex = Math.floor(Math.random() * numSlices);
            const stopAngle = 360 - (prizeIndex * (360/numSlices)) - (360/numSlices/2);
            currentRotation += (360 * 5) + stopAngle - (currentRotation % 360);
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            setTimeout(() => {
                document.getElementById('display').innerHTML = `<strong>${categories[prizeIndex]}</strong>`;
                startTimer();
            }, 4000); 
        }

        function startTimer() {
            let time = 120;
            countdownInterval = setInterval(() => {
                time--;
                let m = Math.floor(time/60), s = time%60;
                document.getElementById('timer').innerText = `0${m}:${s<10?'0':''}${s}`;
                if (time <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('modal').style.display = "flex";
                }
            }, 1000);
        }

        function recordScore(pts) {
            if (currentTeam === 1) {
                score1 += pts; document.getElementById('s1').innerText = score1; currentTeam = 2;
                document.getElementById('t1').classList.remove('active-team'); document.getElementById('t2').classList.add('active-team');
            } else {
                score2 += pts; document.getElementById('s2').innerText = score2; currentTeam = 1;
                document.getElementById('t2').classList.remove('active-team'); document.getElementById('t1').classList.add('active-team');
            }
            document.getElementById('modal').style.display = "none";
            document.getElementById('timer').innerText = "02:00";
            document.getElementById('display').innerText = "Next turn!";
            document.getElementById('spinBtn').disabled = false;
        }
        drawWheel();
    </script>
</body>
</html>
