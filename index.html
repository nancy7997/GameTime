<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <title>Karaoke Showdown</title>
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-dark: #282828;
            --text-main: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background-color: var(--spotify-black);
            color: var(--text-main);
            margin: 0;
            padding: env(safe-area-inset-top) 10px 10px 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        h1 { color: var(--spotify-green); font-weight: 900; margin: 5px 0; font-size: 1.2em; text-transform: uppercase; }
        
        .score-board {
            display: flex;
            justify-content: space-around;
            background-color: var(--spotify-dark);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #444;
        }
        .score-display { font-size: 0.85em; color: #b3b3b3; flex: 1; }
        .team-label { font-size: 1em; color: white; font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .score-num { font-size: 1.3em; color: var(--spotify-green); font-weight: 800; }
        .active-team { border-bottom: 3px solid var(--spotify-green); background: rgba(29, 185, 84, 0.1); }

        /* Controls Row: Timer + Spin Button */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        #timer {
            font-size: 42px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: #FFFFFF;
            background: #333;
            padding: 8px 15px;
            border-radius: 12px;
            min-width: 125px;
        }

        button#spinBtn {
            background-color: var(--spotify-green);
            color: white; border: none;
            padding: 18px 35px; font-size: 1.1em; font-weight: 900;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        button:disabled { background: #555; opacity: 0.5; box-shadow: none; }

        /* Wheel Area */
        .wheel-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #wheel-container {
            position: relative;
            width: 78vw;
            height: 78vw;
            max-width: 330px;
            max-height: 330px;
        }

        #wheel-canvas {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 5px solid white;
            transition: transform 4s cubic-bezier(0.1, 0.7, 0.2, 1); 
        }

        #pointer {
            position: absolute;
            top: -15px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid white;
            z-index: 10;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        /* Result Modal */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--spotify-dark); padding: 30px;
            border-radius: 25px; width: 80%; border: 1px solid #444;
        }
        .modal h2 { margin-top: 0; font-size: 1.4em; }
        .modal button { margin: 10px 0; width: 100%; padding: 20px; font-weight: bold; border-radius: 15px; border:none; font-size: 1.2em;}
    </style>
</head>
<body>

    <header>
        <h1>Karaoke Showdown</h1>
        <div class="score-board">
            <div id="t1-box" class="score-display active-team">
                <span id="t1-name" class="team-label">Team 1</span>
                <span id="s1" class="score-num">0</span>
            </div>
            <div id="t2-box" class="score-display">
                <span id="t2-name" class="team-label">Team 2</span>
                <span id="s2" class="score-num">0</span>
            </div>
        </div>
    </header>

    <div class="controls-row">
        <div id="timer">02:00</div>
        <button onclick="spinWheel()" id="spinBtn">SPIN</button>
    </div>

    <div class="wheel-area">
        <div id="wheel-container">
            <div id="pointer"></div>
            <canvas id="wheel-canvas" width="600" height="600"></canvas>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-team-name">Points?</h2>
            <button onclick="recordScore(100)" style="background:var(--spotify-green); color:white;">YES (100)</button>
            <button onclick="recordScore(25)" style="background:#f1c40f; color:black;">OTHER (25)</button>
            <button onclick="recordScore(0)" style="background:#e74c3c; color:white;">NO (0)</button>
        </div>
    </div>

    <script>
        // Updated Category List
        const categories = [
            "1950s - 1970s", 
            "1980s", 
            "1990s", 
            "2000s", 
            "2010s", 
            "2020s", 
            "Nancy’s Playlist"
        ];
        
        const sliceColors = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4'];

        let team1Name = "Team 1", team2Name = "Team 2", currentTeam = 1, score1 = 0, score2 = 0, countdownInterval, currentRotation = 0;
        const canvas = document.getElementById('wheel-canvas'), ctx = canvas.getContext('2d');
        const centerX = 300, centerY = 300, radius = 290;

        window.onload = function() {
            const n1 = prompt("Team 1 Name:", "Team 1");
            const n2 = prompt("Team 2 Name:", "Team 2");
            if(n1) { team1Name = n1; document.getElementById('t1-name').innerText = n1; }
            if(n2) { team2Name = n2; document.getElementById('t2-name').innerText = n2; }
            drawWheel();
        }

        function drawWheel() {
            const numSlices = categories.length, sliceAngle = (2 * Math.PI) / numSlices;
            ctx.clearRect(0, 0, 600, 600);
            for (let i = 0; i < numSlices; i++) {
                ctx.beginPath(); ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * sliceAngle, (i+1) * sliceAngle);
                ctx.fillStyle = sliceColors[i]; ctx.fill();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = (i === 2) ? "black" : "white";
                ctx.font = "bold 34px sans-serif";

                // UPDATED WRAPPING LOGIC
                let text = categories[i];
                if (text.includes(" - ")) {
                    let parts = text.split(" - ");
                    ctx.fillText(parts[0] + " -", radius - 40, -10);
                    ctx.fillText(parts[1], radius - 40, 35);
                } else if (text.includes(" ")) {
                    let parts = text.split(" ");
                    ctx.fillText(parts[0], radius - 40, -10);
                    ctx.fillText(parts[1], radius - 40, 35);
                } else {
                    ctx.fillText(text, radius - 40, 10);
                }
                ctx.restore();
            }
        }

        function spinWheel() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            
            const numSlices = categories.length;
            const prizeIndex = Math.floor(Math.random() * numSlices);
            
            const degreePerSlice = 360 / numSlices;
            const stopAngle = 360 - (prizeIndex * degreePerSlice) - (degreePerSlice / 2);
            
            currentRotation += (360 * 5) + stopAngle - (currentRotation % 360);
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            // Starts timer exactly when wheel stops
            setTimeout(() => { startTimer(); }, 4000); 
        }

        function startTimer() {
            let time = 120;
            document.getElementById('timer').style.color = "var(--spotify-green)";
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                time--;
                let m = Math.floor(time/60), s = time%60;
                document.getElementById('timer').innerText = `0${m}:${s<10?'0':''}${s}`;
                if (time <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('modal-team-name').innerText = `Did ${(currentTeam==1?team1Name:team2Name)} Sing?`;
                    document.getElementById('modal').style.display = "flex";
                }
            }, 1000);
        }

        function recordScore(pts) {
            if (currentTeam === 1) {
                score1 += pts; document.getElementById('s1').innerText = score1; currentTeam = 2;
                document.getElementById('t1-box').classList.remove('active-team'); document.getElementById('t2-box').classList.add('active-team');
            } else {
                score2 += pts; document.getElementById('s2').innerText = score2; currentTeam = 1;
                document.getElementById('t2-box').classList.remove('active-team'); document.getElementById('t1-box').classList.add('active-team');
            }
            document.getElementById('modal').style.display = "none";
            document.getElementById('timer').innerText = "02:00";
            document.getElementById('timer').style.color = "white";
            document.getElementById('spinBtn').disabled = false;
        }
    </script>
</body>
</html>
